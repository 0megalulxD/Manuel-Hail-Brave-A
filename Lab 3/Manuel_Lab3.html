<!DOCTYPE html>

<html lang="en">

<head>
    <title>HTML Restaurant</title>
    <link rel="stylesheet" href="css3.css">
</head>

<body>

    <h1>HTML Restaurant</h1>

    <form>
        <label for="name">Name:</label>
        <input type="name" id="name" name="name">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">

        <label for="phone">Phone No.:</label>
        <input type="phone" id="phone" name="phone">

        <label for="date">Date:</label>
        <input type="date" id="date" name="date">

        <label for="persons">How many persons will be with you?:</label>
        <input type="persons" id="persons" name="persons">

        <label for="notes">Notes:</label>
        <input type="notes" id="notes" name="notes">

        <label for="entry">Entry:</label>
        <input type="entry" id="entry" name="entry">

        <input type="submit" value="Submit">
    </form>

</body>
